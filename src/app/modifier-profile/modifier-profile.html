<div class="container mt-5" *ngIf="user">
    <div class="card border-0 shadow mx-auto" style="max-width: 600px;">
        <div class="card-body px-4 py-4">
            
            <h4 class="fw-bold mb-4">✏️ Modifier votre profil</h4>
            <hr>

            <form [formGroup]="ModifierProfile" (ngSubmit)="ModifierProfileU()">
                
                <div class="text-center mb-4">
                    <img *ngIf="user.imageProfile && !preview" 
                         [src]="apiUrl + '/image/' + user.imageProfile" 
                         style="height: 150px; width: 150px; border-radius: 50%; object-fit: cover; border: 4px solid #dee2e6;">
                    <img *ngIf="preview" 
                         [src]="preview" 
                         style="height: 150px; width: 150px; border-radius: 50%; object-fit: cover; border: 4px solid #dee2e6;">
                    <div class="mt-2">
                        <input type="file" accept="image/*" (change)="SelectedFile($event)" class="form-control form-control-sm mb-2">
                        <button *ngIf="user.imageProfile" type="button" (click)="delete()" class="btn btn-outline-danger btn-sm">
                            🗑️ Supprimer l'image
                        </button>
                    </div>
                </div>

                <hr>

                <div class="mb-3">
                    <label class="form-label">Nom d'utilisateur</label>
                    <input type="text" formControlName="username" class="form-control" placeholder="Entrez votre nom">
                </div>
                <div class="mb-3">
                    <label class="form-label">tu as Obliée Votre mot de pass ? tu peut le modifier</label>
                    <input type="password" formControlName="password" class="form-control" placeholder="Entrez votre password">
                </div>
                <div class="mb-3">
                    <label class="form-label">Âge</label>
                    <input type="number" formControlName="age" class="form-control" placeholder="Entrez votre âge">
                </div>
                <div class="mb-3">
                    <label class="form-label">Emploi</label>
                    <input type="text" formControlName="jobe" class="form-control" placeholder="Entrez votre emploi">
                </div>

                <div class="d-flex gap-2 mt-4">
                    <button type="submit" class="btn btn-warning" [disabled]="!ModifierProfile.valid">✏️ Modifier</button>
                    <button type="button" routerLink="/profile" class="btn btn-outline-secondary ms-auto">← Retour</button>
                </div>
            </form>
        </div>
    </div>
</div>
