<div class="users-container">
  <div class="container">

    <div class="d-flex justify-content-between align-items-center mb-3 pt-2">
      <h2 class="users-title">Liste des utilisateurs</h2>
      <button type="button" routerLink="/SignalementPublice" class="users-btn-retour btn btn-sm">← Retour</button>
    </div>

    <div class="d-flex gap-3 mb-3 align-items-center">
      <span class="users-filter-label">Filtrer :</span>
      <div class="form-check">
        <input class="form-check-input" type="radio" name="etat" id="Bloque" (click)="EtatChoix('Bloque')">
        <label class="form-check-label" for="Bloque">Bloqué</label>
      </div>
      <div class="form-check">
        <input class="form-check-input" type="radio" name="etat" id="MARCHE" (click)="EtatChoix('MARCHE')">
        <label class="form-check-label" for="MARCHE">Actif</label>
      </div>
      <div class="form-check">
        <input class="form-check-input" type="radio" name="etat" id="touts" (click)="touts()">
        <label class="form-check-label" for="touts">Tous</label>
      </div>
    </div>

    <div *ngIf="users && users.length === 0" class="users-empty">
      <div class="users-empty-icon">👥</div>
      <p class="users-empty-text">Aucun utilisateur trouvé</p>
    </div>

    <table *ngIf="users && users.length > 0" class="table table-bordered table-striped table-hover users-table">
      <thead class="table-dark">
        <tr>
          <th>ID</th>
          <th>Username</th>
          <th>Âge</th>
          <th>Emploi</th>
          <th>État du compte</th>
          <th *ngIf="userServer.role === 'ADMIN'">Actions</th>
        </tr>
      </thead>
      <tbody>
        <tr *ngFor="let user of users">
          <td>{{ user.id }}</td>
          <td>{{ user.username }}</td>
          <td>{{ user.age }}</td>
          <td>{{ user.jobe }}</td>
          <td>
            <span class="badge"
                  [ngClass]="{
                    'bg-success': user.etatCompe === 'MARCHE',
                    'bg-danger': user.etatCompe === 'Bloque'
                  }">
              {{ user.etatCompe === 'MARCHE' ? 'Actif' : 'Bloqué' }}
            </span>
          </td>
          <td *ngIf="userServer.role === 'ADMIN'" class="d-flex gap-2">
            <div class="dropdown d-inline">
              <button class="btn btn-secondary btn-sm dropdown-toggle" data-bs-toggle="dropdown">État</button>
              <ul class="dropdown-menu">
                <li><a class="dropdown-item text-danger" (click)="ModifierEtateCompte(user.id, 'Bloque')">🔒 Bloquer</a></li>
                <li><a class="dropdown-item text-success" (click)="ModifierEtateCompte(user.id, 'MARCHE')">✅ Activer</a></li>
              </ul>
            </div>
            <button class="users-btn-action btn btn-sm" (click)="profile(user.id)">👤 Profil</button>
            <button class="users-btn-action btn btn-sm" (click)="SignalementsUser(user.id)">📋 Signalements</button>
            <button class="users-btn-action btn btn-sm" (click)="commentaires(user.id)">💬 Commentaires</button>
            <button class="btn btn-danger btn-sm" (click)="deleteUser(user.id)">🗑️ Supprimer</button>
          </td>
        </tr>
      </tbody>
    </table>

  </div>
</div>
