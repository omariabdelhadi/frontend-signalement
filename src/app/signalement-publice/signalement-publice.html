<div class="sp-container">
  <div class="container">

    <div class="d-flex justify-content-between align-items-center mb-3 pt-2">
      <h2 class="sp-title">Signalements des utilisateurs</h2>
      <div class="d-flex gap-2" *ngIf="userServer.role==='ADMIN'">
        <button class="sp-btn-admin btn btn-sm" routerLink="/users">Utilisateurs</button>
        <button class="sp-btn-admin btn btn-sm" (click)="mesCommentaires()">Mes Commentaires</button>
        <button class="sp-btn-admin btn btn-sm" routerLink="/Commentaires">Commentaires</button>
      </div>
    </div>

    <div class="d-flex gap-3 mb-3 align-items-center">
      <span class="sp-filter-label">Filtrer :</span>
      <div class="form-check">
        <input class="form-check-input" type="radio" name="statue" id="NOUVEAU" (click)="statueChoix('NOUVEAU')">
        <label class="form-check-label" for="NOUVEAU">Nouveau</label>
      </div>
      <div class="form-check">
        <input class="form-check-input" type="radio" name="statue" id="EN_COURS" (click)="statueChoix('EN_COURS')">
        <label class="form-check-label" for="EN_COURS">En cours</label>
      </div>
      <div class="form-check">
        <input class="form-check-input" type="radio" name="statue" id="RESOLU" (click)="statueChoix('RESOLU')">
        <label class="form-check-label" for="RESOLU">Résolu</label>
      </div>
      <div class="form-check">
        <input class="form-check-input" type="radio" name="statue" id="TOUS" (click)="toutsSignalement()">
        <label class="form-check-label" for="TOUS">Tous</label>
      </div>
    </div>

    <div *ngIf="signalements && signalements.length === 0" class="sp-empty">
      <div class="sp-empty-icon">📭</div>
      <p class="sp-empty-text">Aucun signalement pour le moment</p>
    </div>

    <table *ngIf="signalements && signalements.length > 0" class="table table-bordered table-striped table-hover sp-table">
      <thead class="table-dark">
        <tr>
          <th>ID</th>
          <th>Titre</th>
          <th>Statut</th>
          <th>Date</th>
          <th>Actions</th>
        </tr>
      </thead>
      <tbody>
        <tr *ngFor="let s of signalements">
          <td>{{ s.id }}</td>
          <td>{{ s.titre }}</td>
          <td>
            <span class="badge"
                  [ngClass]="{
                    'bg-primary': s.statue === 'NOUVEAU',
                    'bg-warning text-dark': s.statue === 'EN_COURS',
                    'bg-success': s.statue === 'RESOLU',
                    'bg-danger': s.statue === 'REJETE'
                  }">
              {{ s.statue }}
            </span>
          </td>
          <td>{{ s.date }}</td>
          <td class="d-flex gap-2">
            <button class="sp-btn-details btn btn-sm" (click)="details(s.id)">Détails</button>
            <div class="dropdown d-inline" *ngIf="userServer.role === 'ADMIN'">
              <button class="btn btn-secondary btn-sm dropdown-toggle" data-bs-toggle="dropdown">Statut</button>
              <ul class="dropdown-menu">
                <li><a class="dropdown-item text-danger" (click)="ModifierStatue(s.id, 'REJETE')">Rejeté</a></li>
                <li><a class="dropdown-item text-warning" (click)="ModifierStatue(s.id, 'EN_COURS')">Validé</a></li>
                <li><a class="dropdown-item text-success" (click)="ModifierStatue(s.id, 'RESOLU')">Résolu</a></li>
              </ul>
            </div>
            <button *ngIf="userServer.role==='ADMIN'" class="btn btn-danger btn-sm" (click)="deleteS(s.id)">Supprimer</button>
          </td>
        </tr>
      </tbody>
    </table>

    <button *ngIf="userServer.role==='USER'" type="button" routerLink="/signalementUser" class="sp-btn-retour btn btn-sm mt-2">← Retour</button>

  </div>
</div>
