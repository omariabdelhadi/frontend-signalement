<div class="container mt-4">
    <h2 class="mb-4">Modification d'un signalement</h2>
    <form [formGroup]="ModifierSG" (ngSubmit)="Modifier()" class="w-50">
        <div class="mb-3">
            <label class="form-label">Titre</label>
            <input type="text" formControlName="titre" class="form-control" placeholder="Entrez le titre">
        </div>
        <div class="mb-3">
            <label class="form-label">Description</label>
            <textarea type="text" formControlName="description" class="form-control" placeholder="Entrez la description"></textarea>
        </div>
        <div class="mb-3">
            <label class="form-label">Localisation</label>
            <input type="text" formControlName="localisation" class="form-control" placeholder="Entrez la localisation">
        </div>
        <div class="mb-3">
            <label class="form-label">Image</label>
            <div class="mb-2" *ngIf="!preview">
                <img *ngIf="s" [src]="'https://localhost:8033/ImageS/'+s.image" 
                     style="height: 300px; width: 300px; border-radius: 30%; object-fit: cover;">
            </div>
            <div class="mb-2" *ngIf="preview">
                <img *ngIf="s" [src]="preview" 
                     style="height: 300px; width: 300px; border-radius: 30%; object-fit: cover;">
            </div>
            <input type="file" accept="image/*" (change)="SelectedFile($event)" class="form-control">
        </div>
        <div class="d-flex gap-2">
            <button type="submit" class="btn btn-warning" [disabled]="!file" [disabled]="!ModifierSG.valid">Modifier</button>
            <button type="button" routerLink="/signalementUser" class="btn btn-primary">Retour</button>
        </div>
    </form>
</div>
