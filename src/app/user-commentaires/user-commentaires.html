<div class="container mt-4">

    <div class="d-flex justify-content-between align-items-center mb-3">
        <h4 *ngIf="userServer.role==='USER' || (userServer.role==='ADMIN' && userServer.UserIdAuthentifier==user.id)" class="fw-bold">💬 Tous Vous commentaires </h4>
        <h4 *ngIf="userServer.role==='ADMIN' && userServer.UserIdAuthentifier!=user.id" class="fw-bold">💬 Tous les commentaires de {{user.username}} </h4>
        <button type="button" class="btn btn-outline-secondary btn-sm" (click)="retour()">← Retour</button>
    </div>

    <div *ngIf="commentaires.length===0" class="text-center text-muted py-5">
        Aucun commentaire pour le moment
    </div>

    <div class="border rounded p-3 bg-light">

        <div *ngFor="let commentaire of commentaires"
             class="mb-3 p-3 border rounded bg-white shadow-sm"
             [ngClass]="commentaire.userNameParent ? 'ms-4 border-start border-3 border-primary' : ''">

            <!-- HEADER -->
            <div class="d-flex justify-content-between align-items-center mb-1">
                <h6 class="mb-0">
                    {{commentaire.nomuser}}
                    <span *ngIf="commentaire.role === 'ADMIN'"
                          class="badge bg-warning text-dark ms-1"
                          style="font-size:10px">ADMIN</span>
                </h6>

                <small class="text-muted text-nowrap">{{ commentaire.date }}</small>
            </div>

            <!-- SI C'EST UNE REPONSE -->
            <div *ngIf="commentaire.userNameParent"
                 class="small text-muted mb-2 ps-2">
                ↪ réponse à <strong>{{commentaire.userNameParent}}</strong> :
                <span class="fst-italic">"{{commentaire.ContenueCommentaireParent}}"</span>
            </div>

            <!-- CONTENU -->
            <div class="mb-2">
                {{ commentaire.contenue }}
            </div>

            <!-- ACTIONS -->
            <div class="d-flex justify-content-end gap-2">
                <button class="btn btn-outline-primary btn-sm text-nowrap"
                        type="button"
                        (click)="SignalementC(commentaire.signalementId)">
                    Signalement
                </button>

                <button class="btn btn-danger btn-sm"
                        *ngIf="(commentaire.UserId===userServer.UserIdAuthentifier || userServer.role==='ADMIN') && userServer.isAuthentifier"
                        (click)="deleteCommentaire(commentaire.id)">
                    🗑️
                </button>
            </div>

        </div>

    </div>
</div>
