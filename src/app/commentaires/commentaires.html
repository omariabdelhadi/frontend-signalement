<div class="container mt-4">

    <div class="d-flex justify-content-between align-items-center mb-3">
        <h4 class="fw-bold">💬 Tous les commentaires</h4>
        <button type="button" class="btn btn-outline-secondary btn-sm" (click)="retour()">← Retour</button>
    </div>

    <div *ngIf="commentaires.length===0" class="text-center text-muted py-5">
        Aucun commentaire pour le moment
    </div>

    <div class="border rounded p-3 bg-light">
        <div *ngFor="let commentaire of commentaires" class="mb-2 p-2 border-bottom">
            <div class="d-flex align-items-center justify-content-between gap-2">
                <h6 class="mb-0 text-nowrap">
                        {{commentaire.nomuser}}
                        <span *ngIf="commentaire.role === 'ADMIN'" class="badge bg-warning text-dark ms-1" style="font-size:10px">ADMIN</span>
                </h6>
                <span class="flex-grow-1">{{ commentaire.contenue }}</span>
                <small class="text-muted text-nowrap">{{ commentaire.date }}</small>
                <button class="btn btn-outline-primary btn-sm text-nowrap" type="button" (click)="SignalementC(commentaire.signalementId)">Signalement</button>
                <button class="btn btn-danger btn-sm" *ngIf="(commentaire.UserId===userServer.UserIdAuthentifier || userServer.role==='ADMIN') && userServer.isAuthentifier" (click)="deleteCommentaire(commentaire.id)">🗑️</button>
            </div>
        </div>
    </div>
</div>
